name: Release build (no publish)

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8
        with:
          version: "0.11.28"
      - run: uv sync --frozen
      - run: uv run pytest
      - run: uv build
      - name: Generate checksums
        shell: bash
        run: sha256sum dist/* > dist/SHA256SUMS
      - uses: actions/upload-artifact@v7
        with:
          name: unsigned-release-candidate
          path: dist/*
