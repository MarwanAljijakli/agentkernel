name: Feature request
description: Propose a bounded capability, adapter, benchmark, or research improvement.
title: "[Feature]: "
labels: [enhancement, triage]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem and user-visible outcome
    validations:
      required: true
  - type: textarea
    id: security
    attributes:
      label: Trust-boundary and recovery impact
      description: Identify new effects, authority, data, or failure modes.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Proposed acceptance evidence
    validations:
      required: true
