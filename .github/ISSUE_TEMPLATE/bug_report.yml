name: Bug report
description: Report reproducible incorrect behavior or a misleading assurance claim.
title: "[Bug]: "
labels: [bug, triage]
body:
  - type: markdown
    attributes:
      value: Do not report security vulnerabilities here; follow SECURITY.md.
  - type: textarea
    id: behavior
    attributes:
      label: Observed behavior
      description: Include the exact command, result, and relevant non-sensitive evidence.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: AgentKernel version or commit
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: OS, Python, and backend
    validations:
      required: true
